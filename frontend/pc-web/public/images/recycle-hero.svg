<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="400" fill="url(#grad1)"/>
  
  <!-- 回收标志 -->
  <g transform="translate(300, 200)">
    <!-- 外圆 -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.3"/>
    
    <!-- 箭头 1 -->
    <path d="M -60,-30 L -30,-60 L 0,-30 L 30,-60 L 60,-30 L 30,0 L 60,30 L 30,60 L 0,30 L -30,60 L -60,30 L -30,0 Z" 
          fill="#FFFFFF" opacity="0.9"/>
    
    <!-- 箭头 2 (旋转 120 度) -->
    <path D="M -60,-30 L -30,-60 L 0,-30 L 30,-60 L 60,-30 L 30,0 L 60,30 L 30,60 L 0,30 L -30,60 L -60,30 L -30,0 Z" 
          fill="#FFFFFF" opacity="0.9" transform="rotate(120)"/>
    
    <!-- 箭头 3 (旋转 240 度) -->
    <path d="M -60,-30 L -30,-60 L 0,-30 L 30,-60 L 60,-30 L 30,0 L 60,30 L 30,60 L 0,30 L -30,60 L -60,30 L -30,0 Z" 
          fill="#FFFFFF" opacity="0.9" transform="rotate(240)"/>
    
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.9"/>
  </g>
  
  <!-- 文字 -->
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="#FFFFFF" text-anchor="middle" opacity="0.9">Green Recycle</text>
  <text x="300" y="375" font-family="Arial, sans-serif" font-size="16" 
        fill="#FFFFFF" text-anchor="middle" opacity="0.7">智能废品回收平台</text>
</svg>
