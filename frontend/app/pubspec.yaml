name: green_recycle
description: Green Recycle - 智能废品回收平台
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  get: ^4.6.6
  shared_preferences: ^2.2.2
  flutter_swiper_view: ^1.1.8
  cached_network_image: ^3.3.1
  permission_handler: ^11.1.0
  location: ^5.0.3
  url_launcher: ^6.2.2
  wechat_auth: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    
  fonts:
    - family: DIN
      fonts:
        - asset: assets/fonts/DIN.otf
