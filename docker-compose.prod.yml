version: '3.8'

# 生产环境配置

services:
  mysql:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    volumes:
      - /data/green-recycle/mysql:/var/lib/mysql

  backend:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
    environment:
      GIN_MODE: release

  frontend:
    deploy:
      replicas: 2

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: green-recycle-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - green-recycle
    restart: unless-stopped
